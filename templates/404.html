{% extends 'base.html' %}
{% load static %}

{% block title %}404 - Sistema No Encontrado | TecLegacy{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="text-center">
        <!-- Efecto de Glitch/Neón -->
        <h1 class="display-1 fw-bold glitch-text" style="font-size: 8rem; color: #e60048; text-shadow: 0 0 20px rgba(230, 0, 72, 0.5);">404</h1>
        
        <h2 class="mb-4 text-white" style="font-family: 'Orbitron', sans-serif; letter-spacing: 2px;">SISTEMA NO ENCONTRADO</h2>
        
        <p class="text-muted mb-5" style="max-width: 500px; margin: 0 auto; font-size: 1.1rem;">
            Has intentado acceder a un sector restringido o inexistente en los servidores de <strong class="text-white">TecLegacy</strong>.
        </p>

        <a href="{% url 'products:index' %}" class="btn btn-primary btn-lg px-5 py-3 shadow-lg" style="border-radius: 50px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">
            <i class="fas fa-home me-2"></i> Volver a la Base
        </a>
    </div>
</div>

<style>
    /* Efecto de parpadeo suave al 404 */
    @keyframes glitch {
        0% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.02); text-shadow: 0 0 30px rgba(0, 99, 230, 0.8); }
        100% { opacity: 1; transform: scale(1); }
    }
    
    .glitch-text {
        animation: glitch 3s infinite ease-in-out;
        user-select: none;
    }

    /* Fondo decorativo sutil */
    body {
        background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
    }
</style>
{% endblock %}
