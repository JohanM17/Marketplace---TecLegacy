{% extends "base.html" %}

{% block title %}404 - Página no encontrada | TecLegacy{% endblock %}

{% block content %}
<div class="container text-center my-5 py-5">
    <div class="error-container">
        <h1 class="display-1 fw-bold text-primary">404</h1>
        <h2 class="mb-4">¡GAME OVER!</h2>
        <p class="lead mb-5">Lo sentimos, el nivel que buscas no existe o ha sido movido a otra dimensión.</p>
        <div class="mb-5">
            <i class="fas fa-ghost fa-5x text-muted animate-bounce"></i>
        </div>
        <a href="{% url 'products:index' %}" class="btn btn-primary btn-lg px-5">
            <i class="fas fa-home me-2"></i>Volver al Inicio
        </a>
    </div>
</div>

<style>
    .animate-bounce {
        animation: bounce 2s infinite;
    }
    @keyframes bounce {
        0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
        40% {transform: translateY(-30px);}
        60% {transform: translateY(-15px);}
    }
    .error-container {
        animation: fadeIn 1s ease-in-out;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
{% endblock %}
