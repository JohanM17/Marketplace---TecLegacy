<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TecLegacy - Tecnología y Gaming{% endblock %}</title>
    
    <!-- SEO Básico -->
    <meta name="description" content="{% block meta_description %}TecLegacy: Tu marketplace de tecnología y gaming de alto rendimiento. Encuentra lo último en hardware y gadgets.{% endblock %}">
    <meta name="keywords" content="TecLegacy, tecnología, gaming, hardware, gadgets, ecommerce">
    <meta name="author" content="TecLegacy Team">

    <!-- Open Graph / LinkedIn / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ request.build_absolute_uri }}">
    <meta property="og:title" content="{% block og_title %}TecLegacy - Tecnología y Gaming{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Explora nuestro catálogo de tecnología premium. Diseñado para gamers y entusiastas.{% endblock %}">
    <meta property="og:image" content="{% block og_image %}/static/images/og-image.png{% endblock %}">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/static/images/favicon.png?v=1.1">
    <link rel="shortcut icon" type="image/png" href="/static/images/favicon.png?v=1.1">

    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Toastify JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <!-- Nuestros estilos -->
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/dark-theme.css">
    {% block extra_css %}{% endblock %}
</head>
<body class="dark-theme">

    {% include 'navbar.html' %}

    <!-- Contenedor de mensajes -->
    {% if messages %}
    <div class="container mt-3">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    {% include 'footer.html' %}

    <!-- Chatbot Widget -->
    <div class="chatbot-widget">
        <div class="chatbot-toggle">
            <i class="fas fa-robot"></i>
        </div>
        <div class="chatbot-container d-none">
            <div class="chatbot-header">
                <div class="chatbot-title">Asistente de Búsqueda</div>
                <div class="chatbot-close">×</div>
            </div>
            <div class="chatbot-messages">
                <!-- Los mensajes se cargarán dinámicamente vía JS -->
            </div>
            <div class="chatbot-input">
                <input type="text" placeholder="Escribe tu búsqueda...">
                <button><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Toastify JS -->
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <!-- Nuestros scripts -->
    <script src="/static/js/main.js"></script>
    <script src="/static/js/cart.js?v=1.1"></script>
    <script src="/static/js/chatbot.js"></script>

    <script>
        // Variable global para el token CSRF
        const csrfToken = "{{ csrf_token }}";
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
