{% extends 'base.html' %}

{% block title %}Contraseña Cambiada - TecLegacy{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg bg-dark text-white border-0 rounded-4">
            <div class="card-body p-5 text-center">
                <div class="bg-success bg-opacity-10 text-success rounded-circle d-inline-flex align-items-center justify-content-center mb-4" style="width: 80px; height: 80px;">
                    <i class="fas fa-check-double fa-3x"></i>
                </div>
                <h2 class="fw-bold mb-3">¡Proceso Completado!</h2>
                <p class="text-muted mb-4">
                    Tu contraseña ha sido actualizada exitosamente. Ahora puedes ingresar a tu cuenta con tu nueva llave.
                </p>

                <div class="d-grid">
                    <a href="{% url 'users:login' %}" class="btn btn-primary btn-lg">
                        <i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión Ahora
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
